name: AgentGuard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  agentguard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Start example mock agent
        run: node examples/healthcare-lead-scheduling/mock-agent.mjs &
      - name: Doctor check
        working-directory: examples/healthcare-lead-scheduling
        run: node ../../packages/cli/dist/index.js doctor --ci
      - name: Generate scan artifacts
        working-directory: examples/healthcare-lead-scheduling
        run: |
          node ../../packages/cli/dist/index.js scan --dry-run --ci | tee .agentguard-ci-scan.txt
        env:
          MOCK_AGENT_URL: http://127.0.0.1:4010/chat
      - name: Upload AgentGuard report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: agentguard-example-artifacts
          path: |
            examples/healthcare-lead-scheduling/.agentguard/
            examples/healthcare-lead-scheduling/.agentguard-ci-scan.txt
